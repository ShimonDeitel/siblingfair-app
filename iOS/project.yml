name: SiblingFairnessTracker
options:
  bundleIdPrefix: com.shimondeitel.siblingfair
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SiblingFairnessTracker:
    type: application
    platform: iOS
    sources:
      - path: SiblingFairnessTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.siblingfair
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SiblingFairnessTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SiblingFairnessTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SiblingFairnessTrackerTests
      - path: SiblingFairnessTracker.storekit
    dependencies:
      - target: SiblingFairnessTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.siblingfair.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SiblingFairnessTrackerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SiblingFairnessTrackerUITests
    dependencies:
      - target: SiblingFairnessTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.siblingfair.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SiblingFairnessTracker:
    build:
      targets:
        SiblingFairnessTracker: all
        SiblingFairnessTrackerTests: [test]
        SiblingFairnessTrackerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SiblingFairnessTracker.storekit
    test:
      config: Debug
      storeKitConfiguration: SiblingFairnessTracker.storekit
      targets:
        - SiblingFairnessTrackerTests
        - SiblingFairnessTrackerUITests
    archive:
      config: Release
